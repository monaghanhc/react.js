name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
    paths:
      - "Final-Weather-App_Hunter-Monaghan/Mr.Weather/**"
      - ".github/workflows/github-pages.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "16"
          cache: npm
          cache-dependency-path: Final-Weather-App_Hunter-Monaghan/Mr.Weather/package-lock.json

      - name: Install and build
        working-directory: Final-Weather-App_Hunter-Monaghan/Mr.Weather
        env:
          REACT_APP_WEATHER_API_KEY: ${{ secrets.REACT_APP_WEATHER_API_KEY }}
        run: |
          npm ci
          npm run build

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: Final-Weather-App_Hunter-Monaghan/Mr.Weather/build
